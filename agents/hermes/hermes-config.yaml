# Hermes (orchestrator / product owner) — real config, secrets redacted.
provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key: ${EASTROUTER_API_KEY}
model: z-ai/glm-5.1

memory:
  enabled: true
  scope: workspace

slack:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}
  channels:
    - "#sprint-main"
    - "#agent-coder"
    - "#agent-log"
    - "#ci-cd"
    - "#human-review"

roles:
  - orchestrator
  - product-owner

behavior:
  sprint_planning: true
  issue_assignment: true
  cron_heartbeat: true
  memory_enabled: true